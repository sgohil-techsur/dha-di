apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eso-store-rolebinding-{{ .Values.appSuffix }}
subjects:
  - kind: ServiceAccount
    name: eso-store
    namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eso-store-role