apiVersion: external-secrets.io/v1alpha1
kind: ExternalSecret
metadata:
  name: data-secret
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: k8s-store-local
    kind: SecretStore
  target:
    name: data-secret
    template:
      engineVersion: v2
      data: 
        data.properties: |
          url={{ `{{ .url }}` }}
          password={{ `{{ .password }}` }}
          user={{ `{{ .user }}` }}
  data:  
  - secretKey: url
    remoteRef:
      key: data-service-pguser-data-service
      property: jdbc-uri  
  - secretKey: user
    remoteRef:
      key: data-service-pguser-data-service
      property: user	
  - secretKey: password
    remoteRef:
      key: data-service-pguser-data-service
      property: password